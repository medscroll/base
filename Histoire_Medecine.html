        // ============================================
        // TIMINGS POUR SYNCHRONISATION AUDIO
        // (Basé sur 150 mots/minute)

        const timeline = [
            0,      // Slide 0 - Introduction
            22,     // Slide 1 - Égyptienne
            72,     // Slide 2 - Hébreux
            100,    // Slide 3 - Grecs (Homère)
            129,    // Slide 4 - Écoles grecques
            159,    // Slide 5 - Hippocrate
            188.5,    // Slide 6 - Collection Hippocratique
            218.5,    // Slide 7 - Serment
            259,    // Slide 8 - Méthode hippocratique
            276,    // Slide 9 - Latine (étrusque/romaine)
            310,    // Slide 10 - Évolution latine
            337,    // Slide 11 - Asclépiade et Celse
            374,    // Slide 12 - Galien
            406,    // Slide 13 - Grecs de Galien à 1453
            438,    // Slide 14 - Christianisme
            467,    // Slide 15 - Microbiologie (avant Pasteur)
            496,    // Slide 16 - Découvertes Pasteur
            530,    // Slide 17 - Bactério/virologie
            588,    // Slide 18 - RDC (intro)
            620,    // Slide 19 - Médecin colonial
            650,    // Slide 20 - Médecine mobile
            672,    // Slide 21 - Formation
            703,    // Slide 22 - Système de santé
            742,   // Slide 23 - Grands noms
            778,   // Slide 24 - Ebola 1976-2012
            822    // Slide 25 - Ebola récent + conclusion
        ];

        const totalDuration = 870; // secondes (20 minutes)

        // Variables d'état
        let currentSlide = 0;
        let isAutoPlaying = false;
        let autoPlayInterval;
        let syncInterval;
        
        // Éléments DOM
        const audioPlayer = document.getElementById('audioPlayer');
        const contentDiv = document.getElementById('content');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const statusDiv = document.getElementById('status');
        const slideCounter = document.getElementById('slideCounter');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');

        // ============================================
        // FONCTIONS D'AFFICHAGE
        // ============================================
        function renderSlide(index) {
            const slide = slides[index];
            
            contentDiv.innerHTML = `
                <div class="slide active">
                    <h2 class="slide-title">${slide.title}</h2>
                    <div class="slide-content">${slide.content}</div>
                </div>
            `;
            
            slideCounter.textContent = `${index + 1}/${slides.length}`;
            progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
            
            // Mise à jour des boutons de navigation
            if (!isAutoPlaying) {
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === slides.length - 1;
            }
            
            // Scroll en haut
            contentDiv.scrollTop = 0;
        }

        // ============================================
        // FONCTIONS DE NAVIGATION
        // ============================================
        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        // ============================================
        // SYNCHRONISATION AUDIO / SLIDES
        // ============================================
        function updateTimeDisplay() {
            const current = audioPlayer.currentTime;
            const minutes = Math.floor(current / 60);
            const seconds = Math.floor(current % 60);
            const totalMinutes = Math.floor(totalDuration / 60);
            const totalSeconds = Math.floor(totalDuration % 60);
            
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} / ${totalMinutes.toString().padStart(2, '0')}:${totalSeconds.toString().padStart(2, '0')}`;
            
            // Mise à jour de la barre de progression
            const progress = (current / totalDuration) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
        }

        function checkSync() {
            if (!isAutoPlaying) return;
            
            const currentTime = audioPlayer.currentTime;
            
            // Trouver la slide correspondante au temps actuel
            for (let i = timeline.length - 1; i >= 0; i--) {
                if (currentTime >= timeline[i]) {
                    if (i !== currentSlide) {
                        currentSlide = i;
                        renderSlide(currentSlide);
                    }
                    break;
                }
            }
            
            updateTimeDisplay();
            
            // Arrêt automatique à la fin
            if (currentTime >= totalDuration - 1) {
                stopAutoPlay();
            }
        }

        function startAutoPlay() {
            if (!audioPlayer.src) {
                alert('Veuillez placer le fichier audio "histoire_medecine.mp3" dans le même dossier que ce fichier HTML.');
                return;
            }
            
            isAutoPlaying = true;
            playBtn.textContent = '⏸ Pause';
            playBtn.classList.remove('play-btn');
            playBtn.classList.add('stop-btn');
            statusDiv.textContent = 'Mode automatique';
            statusDiv.style.background = 'rgba(40, 167, 69, 0.9)';
            
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            
            audioPlayer.play();
            
            // Vérifier la synchronisation toutes les 100ms
            syncInterval = setInterval(checkSync, 100);
        }

        function stopAutoPlay() {
            isAutoPlaying = false;
            playBtn.textContent = '▶ Lecture automatique';
            playBtn.classList.remove('stop-btn');
            playBtn.classList.add('play-btn');
            statusDiv.textContent = 'Mode navigation';
            statusDiv.style.background = 'rgba(0,0,0,0.8)';
            
            audioPlayer.pause();
            
            if (syncInterval) {
                clearInterval(syncInterval);
            }
            
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        function toggleAutoPlay() {
            if (isAutoPlaying) {
                stopAutoPlay();
            } else {
                startAutoPlay();
            }
        }

        // ============================================
        // GESTION DES ÉVÉNEMENTS AUDIO
        // ============================================
        audioPlayer.addEventListener('ended', function() {
            stopAutoPlay();
        });

        audioPlayer.addEventListener('timeupdate', function() {
            if (!isAutoPlaying) {
                updateTimeDisplay();
            }
        });

        // ============================================
        // RACCOURCIS CLAVIER
        // ============================================
        document.addEventListener('keydown', function(e) {
            if (isAutoPlaying) return;
            
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === ' ') {
                e.preventDefault();
                toggleAutoPlay();
            }
        });

        // ============================================
        // INITIALISATION
        // ============================================
        renderSlide(0);
        updateTimeDisplay();

        // Vérifier si l'audio existe
        audioPlayer.addEventListener('error', function() {
            console.warn('Fichier audio non trouvé. Placez "histoire_medecine.mp3" dans le même dossier.');
        });
    </script>
