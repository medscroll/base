    {

        <div class="definition">
            <strong>La politique économique se définit comme</strong> un ensemble de mesures et de politiques prises par l'État pour assurer la bonne santé de l'économie et répondre aux besoins des êtres humains vivant en société.

        <p><strong>Premier objectif : la croissance économique.</strong> Il s'agit de viser un niveau élevé de la production et d'augmenter le revenu national.</p>

        <p>Représentons le circuit économique. Les ménages offrent leurs facteurs de travail. Les entreprises produisent des biens et services. Les ménages consomment et épargnent. Les institutions financières, ou marchés financiers, collectent l'épargne et la mettent à disposition des entreprises pour financer l'investissement.</p>

        <p>Elle vise à représenter l'économie de manière synthétique et simplifiée.</p>
        <p>La comptabilité nationale a deux grandes fonctions. D'abord, elle collecte des informations statistiques pour mesurer les flux de production et de revenu dans le circuit économique entre les agents économiques. Ensuite, elle traite et analyse les informations statistiques et les agrégats nationaux.</p>`

    {
        title: "LES OPÉRATIONS ÉCONOMIQUES",
        content: `<h3>LES OPÉRATIONS ÉCONOMIQUES</h3>

            <li><strong>2. Opérations de répartition</strong></li>

        content: `<h3>LES OPÉRATIONS SUR LES BIENS ET SERVICES</h3>

            <li>Consommations intermédiaires (CI)</li>
            <li>Consommation finale (CF)</li>
            <li>Formation brute de capital fixe (FBCF)</li>

    {

        title: "LA CONSOMMATION FINALE",
        content: `<h3>LA CONSOMMATION FINALE</h3>
        <div class="definition">
            <strong>Consommation finale :</strong> Utilisation des biens et services à leur stade final de production, pour satisfaire directement les besoins.

        // Timings pour synchronisation audio (en secondes)
        const timeline = [
  0.0,
  41.0,
  67.0,
  134.0,
  154.0,
  199,
  248,
  278,
  329.0,
  362.0,
  413,
  444,
  462,
  483,
  514,
  558,
  582.0,
  622.0,
  689.5,
  743.0,
  784.0,
  831.0,
  904.0,
  
];

        const totalDuration = 950; // secondes (18 minutes)

        let currentSlide = 0;
        let isAutoPlaying = false;
        let syncInterval;
        
        const audioPlayer = document.getElementById('audioPlayer');
        const contentDiv = document.getElementById('content');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const statusDiv = document.getElementById('status');
        const slideCounter = document.getElementById('slideCounter');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');

        function renderSlide(index) {
            const slide = slides[index];
            contentDiv.innerHTML = `
                <div class="slide active">
                    <h2 class="slide-title">${slide.title}</h2>
                    <div class="slide-content">${slide.content}</div>
                </div>
            `;
            slideCounter.textContent = `${index + 1}/${slides.length}`;
            progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
            if (!isAutoPlaying) {
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === slides.length - 1;
            }
            contentDiv.scrollTop = 0;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        function updateTimeDisplay() {
            const current = audioPlayer.currentTime;
            const minutes = Math.floor(current / 60);
            const seconds = Math.floor(current % 60);
            const totalMinutes = Math.floor(totalDuration / 60);
            const totalSeconds = Math.floor(totalDuration % 60);
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} / ${totalMinutes.toString().padStart(2, '0')}:${totalSeconds.toString().padStart(2, '0')}`;
            const progress = (current / totalDuration) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
        }

        function checkSync() {
            if (!isAutoPlaying) return;
            const currentTime = audioPlayer.currentTime;
            for (let i = timeline.length - 1; i >= 0; i--) {
                if (currentTime >= timeline[i]) {
                    if (i !== currentSlide) {
                        currentSlide = i;
                        renderSlide(currentSlide);
                    }
                    break;
                }
            }
            updateTimeDisplay();
            if (currentTime >= totalDuration - 1) {
                stopAutoPlay();
            }
        }

        function startAutoPlay() {
            if (!audioPlayer.src || audioPlayer.src === window.location.href) {
                alert('Veuillez placer le fichier audio "macro_ch1_2.mp3" dans le même dossier que ce fichier HTML.');
                return;
            }
            isAutoPlaying = true;
            playBtn.textContent = '⏸ Pause';
            playBtn.classList.remove('play-btn');
            playBtn.classList.add('stop-btn');
            statusDiv.textContent = 'Mode automatique';
            statusDiv.style.background = 'rgba(46, 139, 86, 0.9)';
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            audioPlayer.play();
            syncInterval = setInterval(checkSync, 100);
        }

        function stopAutoPlay() {
            isAutoPlaying = false;
            playBtn.textContent = '▶ Lecture automatique';
            playBtn.classList.remove('stop-btn');
            playBtn.classList.add('play-btn');
            statusDiv.textContent = 'Mode navigation';
            statusDiv.style.background = 'rgba(0,0,0,0.8)';
            audioPlayer.pause();
            if (syncInterval) clearInterval(syncInterval);
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        function toggleAutoPlay() {
            if (isAutoPlaying) stopAutoPlay();
            else startAutoPlay();
        }

        audioPlayer.addEventListener('ended', () => stopAutoPlay());
        audioPlayer.addEventListener('timeupdate', () => { if (!isAutoPlaying) updateTimeDisplay(); });

        document.addEventListener('keydown', function(e) {
            if (isAutoPlaying) return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
            else if (e.key === ' ') { e.preventDefault(); toggleAutoPlay(); }
        });

        renderSlide(0);
        updateTimeDisplay();
        
        audioPlayer.addEventListener('error', function() {
            console.warn('Fichier audio non trouvé. Placez "macro_ch1_2.mp3" dans le même dossier.');
        });
    </script>
</body>
