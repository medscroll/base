<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours DOCOM - Documents d'achat et de vente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .progress-bar {
            height: 4px;
            background: #f0f0f0;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2c3e50, #3498db);
            width: 0%;
            transition: width 0.3s ease;
        }

        .header {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #495057;
            font-size: 1.2em;
            font-weight: 500;
        }

        .badge {
            background: #3498db;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .content {
            padding: 30px;
            min-height: 450px;
            max-height: 450px;
            overflow-y: auto;
        }

        .slide {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .slide.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-title {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 20px;
            font-weight: 600;
            border-left: 5px solid #3498db;
            padding-left: 20px;
        }

        .slide-content {
            color: #34495e;
            line-height: 1.8;
            font-size: 1.1em;
        }

        .formula {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            text-align: center;
            border-left: 4px solid #3498db;
        }

        .definition {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #3498db;
        }

        .example {
            background: #fef9e7;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #f39c12;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
        }

        .table th {
            background: #2c3e50;
            color: white;
            font-weight: 600;
            padding: 12px;
            text-align: left;
            border: 1px solid #34495e;
        }

        .table td {
            border: 1px solid #bdc3c7;
            padding: 10px;
        }

        .table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .document-box {
            background: #fff9e6;
            border: 2px solid #d4a017;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .document-box h4 {
            color: #8B4513;
            margin-bottom: 15px;
            border-bottom: 1px dashed #d4a017;
            padding-bottom: 10px;
        }

        .highlight {
            background: #f1c40f;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-btn {
            background: white;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
        }

        .nav-btn:hover:not(:disabled) {
            background: #e9ecef;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .play-btn {
            background: linear-gradient(90deg, #2c3e50, #3498db);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
        }

        .stop-btn {
            background: #e67e22;
            color: white;
        }

        .counter {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9em;
            z-index: 1000;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.1em;
            color: #2c3e50;
            background: #ecf0f1;
            padding: 5px 15px;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .slide-title {
                font-size: 1.4em;
            }
            
            .controls {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="status" id="status">Mode navigation</div>
    
    <div class="container">
        <div class="progress-bar">

        </div>
        
        <div class="header">

            <div style="display: flex; gap: 15px; align-items: center;">
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                <span class="badge" id="slideCounter">1/30</span>
            </div>
        </div>

        <div class="content" id="content">
            <!-- Les slides seront injectées ici -->
        </div>

        <div class="controls">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevSlide()" id="prevBtn">← Précédent</button>
                <button class="nav-btn" onclick="nextSlide()" id="nextBtn">Suivant →</button>
            </div>
            <button class="play-btn" onclick="toggleAutoPlay()" id="playBtn">▶ Lecture automatique</button>
        </div>
    </div>

    <audio id="audioPlayer" src="docom_cours.mp3" preload="auto"></audio>

                content: `

                            <h3>Étape 1 : Commande</h3>

                        <div style="background: #d5f5e3; padding: 15px; border-radius: 8px;">

        // Timeline pour synchronisation audio (en secondes)
        // Basé sur le script avec ~150 mots/minute
        const timeline = [
    31,20,25,22,27.5,79,1,14,
    25,36,21.5,26,16.5,23,
    21.5,17,33,53,
    22,18,14,26,22,14,25, 
    10,10,30,30
];

        // Calcul des temps cumulés
        const cumulativeTimes = [];
        let sum = 0;
        timeline.forEach((time, index) => {
            cumulativeTimes[index] = sum;
            sum += time;
        });
        const totalDuration = sum;

        // Variables d'état
        let currentSlide = 0;
        let isAutoPlaying = false;
        let syncInterval;
        
        // Éléments DOM
        const audioPlayer = document.getElementById('audioPlayer');
        const contentDiv = document.getElementById('content');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const statusDiv = document.getElementById('status');
        const slideCounter = document.getElementById('slideCounter');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');

        // ============================================
        // FONCTIONS D'AFFICHAGE
        // ============================================
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderSlide(index) {
            const slide = slides[index];
            
            contentDiv.innerHTML = `
                <div class="slide active">
                    <h2 class="slide-title">${slide.title}</h2>
                    <div class="slide-content">${slide.content}</div>
                </div>
            `;
            
            slideCounter.textContent = `${index + 1}/${slides.length}`;
            progressFill.style.width = `${((index + 1) / slides.length) * 100}%`;
            
            // Mise à jour des boutons de navigation
            if (!isAutoPlaying) {
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === slides.length - 1;
            }
            
            // Scroll en haut
            contentDiv.scrollTop = 0;
        }

        function updateTimeDisplay() {
            const current = audioPlayer.currentTime || 0;
            timeDisplay.textContent = `${formatTime(current)} / ${formatTime(totalDuration)}`;
            
            const progress = (current / totalDuration) * 100;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
        }

        // ============================================
        // FONCTIONS DE NAVIGATION
        // ============================================
        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }

        // ============================================
        // SYNCHRONISATION AUDIO
        // ============================================
        function checkSync() {
            if (!isAutoPlaying) return;
            
            const currentTime = audioPlayer.currentTime;
            
            // Trouver la slide correspondante
            for (let i = cumulativeTimes.length - 1; i >= 0; i--) {
                if (currentTime >= cumulativeTimes[i]) {
                    if (i !== currentSlide) {
                        currentSlide = i;
                        renderSlide(currentSlide);
                    }
                    break;
                }
            }
            
            updateTimeDisplay();
            
            // Arrêt automatique à la fin
            if (currentTime >= totalDuration - 1) {
                stopAutoPlay();
            }
        }

        function startAutoPlay() {
            if (!audioPlayer.src) {
                alert('Veuillez placer le fichier "docom_cours.mp3" dans le même dossier.');
                return;
            }
            
            isAutoPlaying = true;
            playBtn.textContent = '⏸ Pause';
            playBtn.classList.remove('play-btn');
            playBtn.classList.add('stop-btn');
            statusDiv.textContent = 'Mode automatique';
            statusDiv.style.background = '#27ae60';
            
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            
            audioPlayer.play();
            
            syncInterval = setInterval(checkSync, 100);
        }

        function stopAutoPlay() {
            isAutoPlaying = false;
            playBtn.textContent = '▶ Lecture automatique';
            playBtn.classList.remove('stop-btn');
            playBtn.classList.add('play-btn');
            statusDiv.textContent = 'Mode navigation';
            statusDiv.style.background = 'rgba(0,0,0,0.8)';
            
            audioPlayer.pause();
            
            if (syncInterval) {
                clearInterval(syncInterval);
            }
            
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        function toggleAutoPlay() {
            if (isAutoPlaying) {
                stopAutoPlay();
            } else {
                startAutoPlay();
            }
        }

        // ============================================
        // GESTION DES ÉVÉNEMENTS
        // ============================================
        audioPlayer.addEventListener('ended', function() {
            stopAutoPlay();
        });

        audioPlayer.addEventListener('timeupdate', function() {
            if (!isAutoPlaying) {
                updateTimeDisplay();
            }
        });

        // Raccourcis clavier
        document.addEventListener('keydown', function(e) {
            if (isAutoPlaying) return;
            
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === ' ') {
                e.preventDefault();
                toggleAutoPlay();
            }
        });

        // Initialisation
        renderSlide(0);

        // Vérification audio
        audioPlayer.addEventListener('error', function() {
            console.warn('Fichier audio non trouvé. Placez "docom_cours.mp3" dans le même dossier.');
        });
    </script>
